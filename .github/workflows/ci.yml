name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24's bundled SQLite includes FTS5, which the integration tests require.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
